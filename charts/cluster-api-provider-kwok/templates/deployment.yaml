apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cluster-api-provider-kwok.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluster-api-provider-kwok.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cluster-api-provider-kwok.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        {{- include "cluster-api-provider-kwok.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: manager
        command:
        - /manager
        args:
        - "--leader-elect={{ .Values.leaderElect }}"
        - "--metrics-bind-addr={{ .Values.metricsBindAddr }}"
        - "--health-addr={{ .Values.healthAddr }}"
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: HOME
          value: /tmp
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        # Clear proxy env vars to prevent Docker Desktop proxy from leaking
        # into child kind clusters (which causes containerd to crash).
        - name: HTTP_PROXY
          value: ""
        - name: HTTPS_PROXY
          value: ""
        - name: http_proxy
          value: ""
        - name: https_proxy
          value: ""
        - name: NO_PROXY
          value: ""
        - name: no_proxy
          value: ""
        ports:
        - containerPort: 9440
          name: healthz
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: healthz
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          runAsUser: 0
          allowPrivilegeEscalation: true
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
        - name: kwok-workdir
          mountPath: /tmp/capf-kwok
      serviceAccountName: {{ include "cluster-api-provider-kwok.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      volumes:
      - name: docker-sock
        hostPath:
          path: {{ .Values.dockerSocket.hostPath }}
          type: Socket
      - name: kwok-workdir
        hostPath:
          path: /tmp/capf-kwok
          type: DirectoryOrCreate
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
