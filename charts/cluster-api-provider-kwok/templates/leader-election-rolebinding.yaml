apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cluster-api-provider-kwok.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluster-api-provider-kwok.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cluster-api-provider-kwok.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "cluster-api-provider-kwok.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
