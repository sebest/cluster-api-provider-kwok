image:
  repository: docker.io/sebest/cluster-api-provider-kwok
  tag: dev
  pullPolicy: Always

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

leaderElect: true
metricsBindAddr: "localhost:8080"
healthAddr: ":9440"

# Mount the Docker socket from the host so the KWOK docker runtime
# can create simulated clusters via Docker Compose.
dockerSocket:
  enabled: true
  hostPath: /var/run/docker.sock

serviceAccount:
  create: true
  name: ""

tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/master
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
