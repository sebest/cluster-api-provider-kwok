apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      containers:
      - command:
        - /manager
        args:
        - "--leader-elect"
        - "--metrics-bind-addr=localhost:8080"
        image: controller:latest
        name: manager
        env:
        - name: HOME
          value: /tmp
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        # Clear proxy env vars to prevent Docker Desktop proxy from leaking
        # into child kind clusters (which causes containerd to crash).
        - name: HTTP_PROXY
          value: ""
        - name: HTTPS_PROXY
          value: ""
        - name: http_proxy
          value: ""
        - name: https_proxy
          value: ""
        - name: NO_PROXY
          value: ""
        - name: no_proxy
          value: ""
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
        - name: kwok-workdir
          mountPath: /tmp/capf-kwok
        ports:
        - containerPort: 9440
          name: healthz
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: healthz
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        securityContext:
          runAsUser: 0
          allowPrivilegeEscalation: true
      serviceAccountName: manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket
      - name: kwok-workdir
        hostPath:
          path: /tmp/capf-kwok
          type: DirectoryOrCreate
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
